amcl:
  ros__parameters:
    use_sim_time: False
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: true
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: -1.0
    laser_min_range: -1.0
    laser_model_type: "likelihood_field"
    max_particles: 1500
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.1
    recovery_alpha_slow: 0.001
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    transform_tolerance: 1.0
    update_min_d: 0.1
    update_min_a: 0.1
    z_hit: 0.7
    z_max: 0.05
    z_rand: 0.2
    z_short: 0.05
    scan_topic: "scan"
    set_initial_pose: true
    always_reset_initial_pose: true
    initial_pose: [0.0, 0.0, 0.0, 0.0]

behavior_server:
  ros__parameters:
    use_sim_time: False
    costmap_topic: "local_costmap/costmap_raw"
    footprint_topic: "local_costmap/published_footprint"
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: "map"
    robot_base_frame: "base_link"
    odom_topic: "odom"
    bt_loop_duration: 10
    default_server_timeout: 20
    error_code_name_prefixes: ["follow_path", "compute_path"]
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.5
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.25
      movement_time_allowance: 30.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.50
      state_tolerant_time_allowance: 1.0
    # Regulated Pure Pursuit (RPP) — replaced un-tuned DWB 2026-06-29. DWB scored the
    # near-stationary trajectory best (commanded ~0.05 rad/s, below the base deadband) so
    # the robot never moved → "Failed to make progress". RPP rotates IN PLACE to face the
    # path at a real, above-deadband speed, then drives — robust for this 0.26 m/s diff-drive.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.22          # cruise speed (base max 0.26 m/s)
      lookahead_dist: 0.45
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.7
      lookahead_time: 1.5
      transform_tolerance: 0.5
      use_velocity_scaled_lookahead_dist: false
      # In-place rotation when the path heading is off by > ~40 deg (the start case that
      # stalled DWB). 0.9 rad/s is well above the base's rotational deadband.
      use_rotate_to_heading: true
      rotate_to_heading_min_angle: 0.70
      rotate_to_heading_angular_vel: 0.9
      max_angular_accel: 3.2
      allow_reversing: false
      # Final-approach slowdown — keep min above the base deadband so it still actuates.
      min_approach_linear_velocity: 0.08
      approach_velocity_scaling_dist: 0.6
      # Slow on tight curves (regulated); cost-scaling off (handled by costmap inflation).
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.10
      use_cost_regulated_linear_velocity_scaling: false
      # Forward collision check DISABLED 2026-06-29: RPP's footprint check treats the
      # inscribed band (cost 253, ~0.213 m = robot half-width) around obstacles as a
      # collision, so it froze mid-doorway on any door narrower than ~0.85 m clear even
      # though the 0.43 m robot physically fits. The collision_monitor stop_box (±0.3 m
      # hard-stop) is now the sole automatic collision guard in the nav path.
      use_collision_detection: false
      max_allowed_time_to_collision_up_to_carrot: 1.0
      max_robot_pose_search_dist: 10.0

docking_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.05
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5
    dock_plugins: ["charging_dock"]
    charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      use_battery_status: true
      use_external_detection_pose: false
      charging_threshold: 0.5
      docking_threshold: 0.05
      staging_x_offset: -0.7
      staging_yaw_offset: 0.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      # Stream the full costmap every cycle (not latched-once) so a remote/late RViz
      # over the LAN reliably receives it — fixes RViz "No map received" for costmaps.
      always_send_full_costmap: True
      global_frame: "odom"
      transform_tolerance: 1.0
      # Wait (effectively) forever for the odom->base_link TF during activation
      # instead of aborting. If the navigation stack (re)starts while the SBC is
      # down/disconnected, the bridge isn't publishing odom yet, so the costmap
      # has no base_link->odom transform. With the default (~3 s) timeout the
      # costmap activation FAILED -> lifecycle_manager "Aborting bringup" -> the
      # container stayed alive but EMPTY, so systemd never restarted it and Nav2
      # never recovered even after the SBC came back. The lifecycle_manager blocks
      # indefinitely on each node's activation (change_state has no timeout), so a
      # huge value here just makes bringup PARK until the SBC returns, then it
      # activates cleanly with zero intervention. ~11.5 days = any realistic outage.
      initial_transform_timeout: 1000000.0
      robot_base_frame: "base_link"
      use_sim_time: False
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.1
      # Octagonal footprint from the robot's own ARIA params (patrolbot-sh.p):
      # RobotLength 510 mm (=+/-0.255 x), RobotWidth 425 mm (=+/-0.2125 y),
      # corner vertices at the user-guide swing radius 0.29 m. Replaces the old
      # robot_radius: 0.22 which only covered the half-WIDTH and left the front
      # (laser) and rear (sonar) ends ~3-7 cm outside the modeled footprint.
      footprint: "[[0.255, 0.138], [0.197, 0.213], [-0.197, 0.213], [-0.255, 0.138], [-0.255, -0.138], [-0.197, -0.213], [0.197, -0.213], [0.255, -0.138]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          # Seconds without a scan before the observation buffer is flagged
          # not-current (costmap.isCurrent() -> false). /scan runs ~20 Hz, so 0.5 s
          # = 10 missed scans: a real laser/link loss, not a hiccup. The safety
          # watchdog stops the robot on the same event; this is defence in depth so
          # the costmap never plans on a stale obstacle snapshot.
          expected_update_rate: 0.5
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.40

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      # NOTE: do NOT set always_send_full_costmap here. The StaticLayer forces this global
      # costmap to the MAP's resolution (0.075 m) → 3192×2205 ≈ 6 MB per message. Streaming
      # that every cycle re-saturates the Pi/WiFi (load spikes, /scan jitter → watchdog
      # holds) even on the LAN. The robot's immediate drivable area is shown by the LIGHT
      # rolling local_costmap instead; the whole-building walls come from the static map.
      transform_tolerance: 1.0
      # Wait (effectively) forever for the base_link->map TF during activation
      # instead of aborting bringup — see the long note in local_costmap above.
      # global needs map->odom (AMCL) + odom->base_link (bridge); both are absent
      # while the hardware link is silent, so without this the stack permanently gives up.
      initial_transform_timeout: 1000000.0
      global_frame: "map"
      robot_base_frame: "base_link"
      use_sim_time: False
      # Octagonal footprint — same as local_costmap (see note there). From ARIA
      # params + 0.29 m swing radius; replaces undersized robot_radius: 0.22.
      footprint: "[[0.255, 0.138], [0.197, 0.213], [-0.197, 0.213], [-0.255, 0.138], [-0.255, -0.138], [-0.197, -0.213], [0.197, -0.213], [0.255, -0.138]]"
      resolution: 0.2
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        observation_sources: scan
        scan:
          topic: /scan
          # Seconds without a scan before the observation buffer is flagged
          # not-current (costmap.isCurrent() -> false). /scan runs ~20 Hz, so 0.5 s
          # = 10 missed scans: a real laser/link loss, not a hiccup. The safety
          # watchdog stops the robot on the same event; this is defence in depth so
          # the costmap never plans on a stale obstacle snapshot.
          expected_update_rate: 0.5
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.40

map_server:
  ros__parameters:
    use_sim_time: False

planner_server:
  ros__parameters:
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

route_server:
  ros__parameters:
    use_sim_time: False
    graph_loaders: ["GeoJsonGraphFileLoader"]
    GeoJsonGraphFileLoader:
      plugin: "nav2_route::GeoJsonGraphFileLoader"
    scorers: ["DistanceScorer", "DynamicEdgesScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    DynamicEdgesScorer:
      plugin: "nav2_route::DynamicEdgesScorer"
    operations: ["AdjustSpeedLimit", "ReroutingService"]
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    ReroutingService:
      plugin: "nav2_route::ReroutingService"

smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_iterations: 500
      w_data: 0.2
      w_smooth: 0.3

velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    odom_topic: "odom"
    cmd_vel_topic: "cmd_vel_raw"
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.26, 0.0, 1.0]
    min_velocity: [-0.26, 0.0, -1.0]
    max_accel: [2.5, 0.0, 3.2]
    max_decel: [-2.5, 0.0, -3.2]

waypoint_follower:
  ros__parameters:
    use_sim_time: False
    loop_rate: 20
    stop_on_failure: False
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      time_to_wait: 0.0

collision_monitor:
  ros__parameters:
    use_sim_time: False
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    # Must match velocity_smoother's actual output. The smoother publishes
    # /cmd_vel_smoothed (its 'cmd_vel_topic' param is not a real nav2 param and is
    # ignored); collision_monitor previously read /cmd_vel_raw which had no
    # publisher, so nav commands never reached the robot.
    cmd_vel_in_topic: "cmd_vel_smoothed"
    # Nav2 output goes to twist_mux's navigation input (priority 5) instead of
    # straight to the robot, so the joystick (input/joy, priority 8) can override
    # it. twist_mux -> cmd_vel_out -> teleop_velocity_smoother -> /cmd_vel -> bridge.
    cmd_vel_out_topic: "input/navi"
    state_topic: "collision_monitor_state"
    transform_tolerance: 1.0
    source_timeout: 2.0
    # MUST stay False. With True, collision_monitor looks up laser_frame->odom at
    # each scan's exact timestamp to compensate for robot motion. After a bridge/SBC
    # reconnect there is a brief TF gap, so a scan can arrive stamped earlier than the
    # rebuilt TF cache -> tf2::BackwardExtrapolationException. collision_monitor does
    # NOT wrap this in a message filter, so the uncaught throw SIGABRTs the entire
    # composed nav2_container (every Nav2 node dies at once). False uses the latest
    # transform instead, which is fine at this robot's 0.26 m/s top speed (~1 cm of
    # motion per scan). This is the root cause of the TODO item-1 reconnect crash.
    base_shift_correction: False
    polygons: ["stop_box"]
    stop_box:
      type: "polygon"
      points: "[[0.3, 0.3], [0.3, -0.3], [-0.3, -0.3], [-0.3, 0.3]]"
      action_type: "stop"
      min_points: 8
      visualize: True
      polygon_pub_topic: "stop_box_polygon"
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"

# NOTE: nav2_bringup does NOT load this params file into its lifecycle_manager
# nodes (it only passes autostart + node_names inline), so bond_timeout cannot be
# set here. The local patched launch files pass bond_timeout: 0.0 directly and
# load the Nav2 nodes into one composed container (see bringup.launch.py).
